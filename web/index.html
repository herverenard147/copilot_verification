<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Copilote de reçus &amp; dépenses</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<header class="app-header">
  <div class="brand">🧾 <span>Copilote de reçus</span></div>
  <nav class="nav" id="nav">
    <button data-tab="analyze" class="active">Analyser</button>
    <button data-tab="dashboard">Tableau de bord</button>
    <button data-tab="accounting">Comptabilité</button>
    <button data-tab="ask">Questions</button>
    <button data-tab="technical">Technique</button>
  </nav>
  <div class="header-actions">
    <button class="btn" id="btn-settings" title="Réglages">⚙️ Réglages</button>
  </div>
</header>

<!-- Bandeau permanent du mode démonstration (masqué par défaut) -->
<div id="demo-banner" class="demo-banner hidden">
  🔬 <b>Mode démonstration</b> — données du corpus CORD, pas vos dépenses réelles.
  <button class="btn btn--ghost" id="demo-exit">Quitter le mode démo</button>
</div>

<main class="container">

  <!-- ONGLET 1 : ANALYSER -->
  <section id="tab-analyze" class="tab">
    <div class="row" style="margin-bottom:var(--lg)">
      <div>
        <label class="field" for="sel-country">Pays</label>
        <select id="sel-country"></select>
      </div>
      <div>
        <label class="field" for="sel-payment">Mode de paiement</label>
        <select id="sel-payment"></select>
      </div>
    </div>
    <div id="analyze-body"><!-- rempli par JS : vide / traitement / résultat / erreur --></div>
  </section>

  <!-- ONGLET 2 : TABLEAU DE BORD -->
  <section id="tab-dashboard" class="tab hidden">
    <div id="dashboard-body" class="stack"></div>
  </section>

  <!-- ONGLET 3 : COMPTABILITÉ -->
  <section id="tab-accounting" class="tab hidden">
    <div class="row" style="margin-bottom:var(--lg)">
      <div>
        <label class="field" for="sel-period">Période</label>
        <select id="sel-period">
          <option>Mois en cours</option>
          <option>Trimestre en cours</option>
          <option>Personnalisée</option>
        </select>
      </div>
    </div>
    <div id="accounting-body" class="stack"></div>
  </section>

  <!-- ONGLET 4 : QUESTIONS -->
  <section id="tab-ask" class="tab hidden">
    <h2 class="headline-sm" style="margin-top:0">Interroger l'historique de dépenses</h2>
    <div style="margin:var(--md) 0">
      <input id="ask-input" placeholder="Ex. : combien ai-je dépensé en boissons ?" />
    </div>
    <div class="pill-row" id="ask-suggestions" style="margin-bottom:var(--md)"></div>
    <div class="btn-row" style="margin-bottom:var(--lg)">
      <button class="btn btn--primary" id="ask-search">Chercher</button>
    </div>
    <div id="ask-body" class="stack"></div>
    <div id="ask-history" style="margin-top:var(--lg)"></div>
  </section>

  <!-- ONGLET 5 : TECHNIQUE -->
  <section id="tab-technical" class="tab hidden">
    <div id="technical-body" class="stack"></div>
  </section>

</main>

<!-- Panneau réglages -->
<div class="overlay" id="overlay"></div>
<aside class="panel" id="panel">
  <div class="panel-head">
    <h3 class="headline-sm" style="margin:0">⚙️ Réglages</h3>
    <button class="btn" id="panel-close">Fermer</button>
  </div>
  <div class="section-body stack" id="panel-body"></div>
</aside>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
</body>
</html>
